name: CI - Push/merge into main

on:
  push:
    branches:
        - main
    paths-ignore:
        - 'docs/**'
        - 'README.md'
        - 'LICENSE'
        - 'CONTRIBUTING.md'
        - 'CODE_OF_CONDUCT.md'
        - 'SECURITY.md'
        - 'PULL_REQUEST_TEMPLATE.md'
        - 'ISSUE_TEMPLATE.md'
        - '.github/**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            qemu: false
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            qemu: false
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
            qemu: true
          - platform: linux/arm/v6
            runner: ubuntu-24.04-arm
            qemu: true
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ github.repository_owner }}/alpine
            ghcr.io/${{ github.repository_owner }}/alpine
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short

      - name: Set up QEMU
        if: matrix.qemu
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=buildkit-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ env.PLATFORM_PAIR }}
          context: .
          file: Dockerfile
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    runs-on: ubuntu-24.04
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ github.repository_owner }}/alpine
            ghcr.io/${{ github.repository_owner }}/alpine
          flavor: latest=true
          tags: |
            type=sha,prefix=,suffix=,format=short

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ github.repository_owner }}/alpine@sha256:%s ghcr.io/${{ github.repository_owner }}/alpine@sha256:%s ' * *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ github.repository_owner }}/alpine:${{ steps.meta.outputs.version }}
